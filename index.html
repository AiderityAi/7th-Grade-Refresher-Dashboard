<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Web Math Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rubik:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a0d;
    --void-2:#131318;
    --panel:#1a1a21;
    --panel-2:#20202a;
    --line:#2c2c38;
    --chakra:#ff7a1a;
    --chakra-dim:#7a3d15;
    --suit:#e21b3c;
    --suit-dim:#5c0f1c;
    --gold:#ffcc3a;
    --ink:#f0eee8;
    --ink-dim:#a8a6ae;
    --ok:#3ddc84;
    --bad:#ff4d5e;
    --card-radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(255,122,26,0.12), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(226,27,60,0.10), transparent 45%),
      var(--void);
    color:var(--ink);
    font-family:'Rubik',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Bangers',cursive; letter-spacing:1px;}
  .mono{font-family:'JetBrains Mono',monospace;}

  #app{max-width:720px;margin:0 auto;padding:18px 16px 60px;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:18px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand-mark{
    width:40px;height:40px;border-radius:10px;
    background:linear-gradient(145deg, var(--chakra), var(--suit));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bangers',cursive;font-size:20px;color:#0a0a0d;
    box-shadow:0 0 0 2px var(--void-2), 0 0 18px rgba(255,122,26,0.35);
    flex-shrink:0;
  }
  .brand-text .t1{font-size:11px;letter-spacing:2.5px;color:var(--ink-dim);text-transform:uppercase;}
  .brand-text .t2{font-family:'Bangers',cursive;font-size:22px;line-height:1;letter-spacing:1px;}

  .xp-wrap{text-align:right; flex-shrink:0;}
  .xp-num{font-family:'Bangers',cursive; font-size:22px; color:var(--gold); line-height:1;}
  .xp-label{font-size:10px; color:var(--ink-dim); letter-spacing:1.5px; text-transform:uppercase;}

  /* ---------- Arc banner ---------- */
  .arc-banner{
    border-radius:14px; padding:14px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line);
  }
  .arc-banner.chakra{ background:linear-gradient(120deg, rgba(255,122,26,0.16), rgba(255,122,26,0.02)); }
  .arc-banner.suit{ background:linear-gradient(120deg, rgba(226,27,60,0.18), rgba(226,27,60,0.02)); }
  .arc-icon{font-size:22px;}
  .arc-banner .arc-t{font-family:'Bangers',cursive; font-size:17px; letter-spacing:0.5px;}
  .arc-banner .arc-s{font-size:12px; color:var(--ink-dim);}

  /* ---------- Dashboard path ---------- */
  .path{
    display:flex; flex-direction:column; gap:10px; margin-bottom:20px;
  }
  .node{
    display:flex; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--card-radius); padding:12px 14px;
    cursor:pointer; transition:transform .15s ease, border-color .15s ease;
    position:relative;
  }
  .node:hover{ transform:translateX(2px); }
  .node.locked{ cursor:not-allowed; opacity:0.45; }
  .node.done{ border-color:rgba(61,220,132,0.4); }
  .node.current{ border-color:var(--chakra); box-shadow:0 0 0 1px rgba(255,122,26,0.25) inset; }
  .node .num{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Bangers',cursive;font-size:17px;
    background:var(--panel-2); color:var(--ink-dim);
  }
  .node.current .num{ background:var(--chakra); color:#1a0d02; }
  .node.done .num{ background:var(--ok); color:#052b16; }
  .node .info{flex:1; min-width:0;}
  .node .info .nt{font-weight:700; font-size:14.5px;}
  .node .info .ns{font-size:11.5px; color:var(--ink-dim); margin-top:1px;}
  .node .badge-icon{font-size:18px; flex-shrink:0;}
  .node .lock-icon{font-size:15px; color:var(--ink-dim); flex-shrink:0;}

  /* ---------- Reward shelf ---------- */
  .shelf-title{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); margin:22px 0 10px;}
  .shelf{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px;}
  .shelf-item{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 6px; text-align:center; font-size:10.5px; color:var(--ink-dim);
  }
  .shelf-item.earned{ border-color:var(--gold); color:var(--ink); background:rgba(255,204,58,0.08); }
  .shelf-item .si-icon{font-size:20px; display:block; margin-bottom:4px;}

  .reset-row{ text-align:center; margin-top:26px; }
  .reset-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    padding:8px 14px; border-radius:20px; font-size:11.5px; cursor:pointer;
  }

  /* ---------- Day view ---------- */
  .day-header{ margin-bottom:16px; }
  .back-btn{
    background:none;border:none;color:var(--ink-dim); font-size:13px;
    cursor:pointer; padding:4px 0; margin-bottom:8px; display:flex; align-items:center; gap:6px;
  }
  .day-title{ font-family:'Bangers',cursive; font-size:28px; line-height:1.05; margin:2px 0 2px; }
  .day-sub{ font-size:12.5px; color:var(--ink-dim); }
  .day-mission{ font-size:13.5px; margin-top:8px; color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }

  .levels-row{ display:flex; gap:6px; margin:16px 0 18px; }
  .level-pip{
    flex:1; height:6px; border-radius:4px; background:var(--panel-2);
  }
  .level-pip.active{ background:var(--chakra); }
  .level-pip.pastdone{ background:var(--ok); }
  .suit .level-pip.active{ background:var(--suit); }
  .suit .level-pip.pastdone{ background:var(--ok); }

  .level-label{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px; }

  /* Flashcard */
  .flash-stage{ display:flex; flex-direction:column; align-items:center; gap:16px; }
  .flashcard{
    width:100%; max-width:420px; min-height:170px; border-radius:20px;
    background:linear-gradient(160deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; cursor:pointer; position:relative;
  }
  .flashcard .fc-tag{ position:absolute; top:12px; left:14px; font-size:10px; letter-spacing:1.5px; color:var(--ink-dim); text-transform:uppercase; }
  .flashcard .fc-q{ font-family:'Bangers',cursive; font-size:30px; letter-spacing:0.5px; }
  .flashcard .fc-a{ font-family:'Bangers',cursive; font-size:30px; color:var(--gold); }
  .flashcard .fc-hint{ position:absolute; bottom:10px; font-size:10.5px; color:var(--ink-dim); }
  .fc-controls{ display:flex; gap:10px; width:100%; max-width:420px; }
  .fc-btn{ flex:1; padding:12px; border-radius:12px; border:none; font-weight:700; font-size:13.5px; cursor:pointer; }
  .fc-btn.miss{ background:rgba(255,77,94,0.14); color:var(--bad); border:1px solid rgba(255,77,94,0.4);}
  .fc-btn.got{ background:rgba(61,220,132,0.14); color:var(--ok); border:1px solid rgba(61,220,132,0.4);}
  .fc-progress{ font-size:12px; color:var(--ink-dim); }

  /* Video */
  .video-card{
    background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px;
    text-align:center;
  }
  .video-card .vc-icon{ font-size:34px; margin-bottom:8px; }
  .video-card .vc-label{ font-family:'Bangers',cursive; font-size:20px; margin-bottom:6px; }
  .video-card .vc-note{ font-size:12.5px; color:var(--ink-dim); margin-bottom:16px; }
  .primary-btn{
    display:inline-block; background:var(--chakra); color:#1a0d02; text-decoration:none;
    font-weight:800; padding:12px 20px; border-radius:12px; font-size:14px; border:none; cursor:pointer;
  }
  .suit .primary-btn{ background:var(--suit); color:#fff; }
  .secondary-btn{
    display:inline-block; background:var(--panel-2); color:var(--ink); text-decoration:none;
    font-weight:700; padding:12px 20px; border-radius:12px; font-size:14px; border:1px solid var(--line); cursor:pointer; margin-top:10px;
  }

  /* Quiz (practice + boss) */
  .quiz-q{ font-size:17px; font-weight:700; margin-bottom:14px; line-height:1.4; }
  .quiz-choices{ display:flex; flex-direction:column; gap:9px; margin-bottom:14px;}
  .choice-btn{
    text-align:left; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:14.5px; cursor:pointer; font-family:'Rubik',sans-serif;
  }
  .choice-btn.correct{ border-color:var(--ok); background:rgba(61,220,132,0.14); }
  .choice-btn.wrong{ border-color:var(--bad); background:rgba(255,77,94,0.14); }
  .choice-btn:disabled{ cursor:default; }
  .quiz-progress{ font-size:12px; color:var(--ink-dim); margin-bottom:10px; }
  .feedback{ font-size:13px; margin-bottom:12px; font-weight:700; }
  .feedback.ok{ color:var(--ok); }
  .feedback.bad{ color:var(--bad); }

  .boss-meter-wrap{ margin-bottom:16px; }
  .boss-meter-label{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-dim); margin-bottom:5px; }
  .boss-meter{ height:10px; border-radius:6px; background:var(--panel-2); overflow:hidden; border:1px solid var(--line); }
  .boss-meter-fill{ height:100%; background:linear-gradient(90deg, var(--suit), var(--chakra)); transition:width .3s ease; }

  /* Summary */
  .summary-wrap{ text-align:center; padding:20px 10px; }
  .summary-icon{ font-size:52px; margin-bottom:10px; }
  .summary-title{ font-family:'Bangers',cursive; font-size:30px; margin-bottom:6px; }
  .summary-sub{ font-size:13.5px; color:var(--ink-dim); margin-bottom:18px; }
  .xp-pill{
    display:inline-block; background:rgba(255,204,58,0.14); border:1px solid rgba(255,204,58,0.4);
    color:var(--gold); font-weight:800; padding:8px 16px; border-radius:20px; font-size:14px; margin-bottom:20px;
  }
  .fail-note{ font-size:13px; color:var(--bad); margin-bottom:16px; }

  ::selection{ background:var(--chakra); color:#1a0d02; }
  a{ color:inherit; }

  /* ---------- Touch targets ---------- */
  .choice-btn{ min-height:48px; }
  .fc-btn{ min-height:48px; }
  .primary-btn, .secondary-btn{ min-height:46px; display:inline-flex; align-items:center; justify-content:center; }
  .node{ min-height:56px; }

  /* ---------- Mobile ---------- */
  @media (max-width:480px){
    #app{ padding:12px 10px 50px; }
    .topbar{ margin-bottom:14px; }
    .brand-mark{ width:34px;height:34px;font-size:16px;border-radius:8px; }
    .brand-text .t1{ font-size:9px; letter-spacing:1.8px; }
    .brand-text .t2{ font-size:18px; }
    .xp-num{ font-size:19px; }
    .xp-label{ font-size:9px; }
    .arc-banner{ padding:11px 12px; }
    .node{ padding:11px 12px; gap:10px; border-radius:13px; }
    .node .num{ width:32px;height:32px;font-size:14px;border-radius:8px; }
    .node .info .nt{ font-size:13.5px; }
    .node .info .ns{ font-size:10.5px; }
    .shelf{ grid-template-columns:repeat(2,1fr); gap:7px; }
    .shelf-item{ font-size:11px; padding:10px 6px; }
    .day-title{ font-size:23px; }
    .day-mission{ font-size:12.5px; padding:9px 11px; }
    .flashcard{ min-height:150px; padding:20px 16px; }
    .flashcard .fc-q, .flashcard .fc-a{ font-size:24px; }
    .fc-controls{ flex-direction:column; }
    .video-card{ padding:18px 14px; }
    .quiz-q{ font-size:15.5px; }
    .choice-btn{ font-size:13.5px; padding:12px 13px; }
    .primary-btn, .secondary-btn{ width:100%; padding:13px 16px; font-size:13.5px; }
    .summary-title{ font-size:25px; }
  }

  @media (max-width:360px){
    .shelf{ grid-template-columns:repeat(2,1fr); }
    .node .info .nt{ font-size:12.5px; }
    .flashcard .fc-q, .flashcard .fc-a{ font-size:21px; }
  }
</style>
</head>

  {xp:100, icon:"🍥", label:"Naruto Sticker"},

function bossThreshold(day){
  if(day.day===7) return 6;
  if(day.day===14) return 8;
  return Math.ceil(day.boss.length*0.6);
}

/* ============================= STATE ============================= */

const STORAGE_KEY = "shadow-web-academy-progress";
let progress = { xp:0, unlockedDay:1, completedDays:{}, badges:[] };
let ready = false;

let view = { screen:'dashboard', day:null, sub:'flashcards' };
let fc = { idx:0, deckOrder:[], correct:0 };
let quiz = { idx:0, correct:0, selected:null, showResult:false, list:[] };
let videoWatched = false;
let lastBossPassed = null;
let lastXpGain = 0;

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value) progress = JSON.parse(res.value);
  }catch(e){ /* no saved progress yet */ }
  ready = true;
  render();
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(progress), false); }catch(e){}
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ============================= NAV HELPERS ============================= */

function goDashboard(){ view = {screen:'dashboard', day:null, sub:'flashcards'}; render(); }

function openDay(dayNum){
  if(dayNum > progress.unlockedDay) return;
  view = { screen:'day', day:dayNum, sub:'flashcards' };
  const d = DAYS[dayNum-1];
  fc = { idx:0, deckOrder:shuffle(d.flashcards.map((_,i)=>i)), correct:0 };
  videoWatched = false;
  render();
}

function goSub(sub){
  const d = DAYS[view.day-1];
  view.sub = sub;
  if(sub==='practice'){
    quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.practice };
  } else if(sub==='boss'){
    quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.boss };
  }
  render();
}

/* ============================= ACTIONS ============================= */

function flipCard(){ fc.flipped = !fc.flipped; render(); }

function markCard(gotIt){
  if(gotIt) fc.correct++;
  fc.flipped = false;
  fc.idx++;
  if(fc.idx >= fc.deckOrder.length){
    const gained = fc.correct*10;
    progress.xp += gained;
    lastXpGain = gained;
    saveProgress();
    goSub('video');
    return;
  }
  render();
}

function markVideoWatched(){
  videoWatched = true;
  render();
}

function selectAnswer(choiceIdx){
  if(quiz.showResult) return;
  const q = quiz.list[quiz.idx];
  quiz.selected = choiceIdx;
  quiz.showResult = true;
  if(choiceIdx === q.correct) quiz.correct++;
  render();
}

function nextQuestion(){
  quiz.idx++;
  quiz.selected = null;
  quiz.showResult = false;
  if(quiz.idx >= quiz.list.length){
    if(view.sub === 'practice'){
      const gained = 30;
      progress.xp += gained;
      lastXpGain = gained;
      saveProgress();
      goSub('boss');
    } else if(view.sub === 'boss'){
      finishBoss();
    }
    return;
  }
  render();
}

function finishBoss(){
  const d = DAYS[view.day-1];
  const need = bossThreshold(d);
  const passed = quiz.correct >= need;
  lastBossPassed = passed;
  if(passed){
    const perfect = quiz.correct === quiz.list.length;
    const gained = perfect ? 100 : 50;
    progress.xp += gained;
    lastXpGain = gained;
    if(!progress.completedDays[d.day]){
      progress.completedDays[d.day] = true;
      progress.xp += 50; // day completion bonus
      lastXpGain += 50;
    }
    if(d.specialBadge && !progress.badges.includes(d.specialBadge.name)){
      progress.badges.push(d.specialBadge.name);
    }
    if(progress.unlockedDay === d.day && d.day < DAYS.length){
      progress.unlockedDay = d.day + 1;
    }
    saveProgress();
  }
  view.sub = 'summary';
  render();
}

function retryBoss(){
  const d = DAYS[view.day-1];
  quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.boss };
  view.sub = 'boss';
  render();
}

async function resetProgress(){
  progress = { xp:0, unlockedDay:1, completedDays:{}, badges:[] };
  await saveProgress();
  goDashboard();
}

/* ============================= RENDER ============================= */

function esc(s){ return String(s); }

function render(){
  const app = document.getElementById('app');
  if(!ready){ app.innerHTML = '<div style="text-align:center;padding:80px 0;color:#a8a6ae;">Loading your academy…</div>'; return; }

  let html = '';
  html += renderTopbar();

  if(view.screen === 'dashboard'){
    html += renderDashboard();
  } else {
    html += renderDayScreen();
  }

  app.innerHTML = html;
  bindEvents();
}

function renderTopbar(){
  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">武</div>
      <div class="brand-text">
        <div class="t1">14-Day Power-Up</div>
        <div class="t2 display">Shadow Web Academy</div>
      </div>
    </div>
    <div class="xp-wrap">
      <div class="xp-num mono">${progress.xp}</div>
      <div class="xp-label">Total XP</div>
    </div>
  </div>`;
}

function renderDashboard(){
  let html = '<div class="path">';
  DAYS.forEach(d=>{
    const done = !!progress.completedDays[d.day];
    const locked = d.day > progress.unlockedDay;
    const current = d.day === progress.unlockedDay && !done;
    let cls = 'node';
    if(locked) cls += ' locked'; else if(done) cls += ' done'; else if(current) cls += ' current';
    html += `<div class="${cls}" data-day="${d.day}">
      <div class="num">${done ? '✓' : d.day}</div>
      <div class="info">
        <div class="nt">${esc(d.title)}</div>
        <div class="ns">${esc(d.subtitle)}</div>
      </div>
      ${d.specialBadge ? `<div class="badge-icon">${d.specialBadge.icon}</div>` : ''}
      ${locked ? '<div class="lock-icon">🔒</div>' : ''}
    </div>`;
  });
  html += '</div>';

  html += '<div class="shelf-title">Real-World Reward Shelf</div><div class="shelf">';
  REWARDS.forEach(r=>{
    const earned = progress.xp >= r.xp;
    html += `<div class="shelf-item ${earned?'earned':''}">
      <span class="si-icon">${r.icon}</span>
      ${r.label}<br><span class="mono">${r.xp} XP</span>
    </div>`;
  });
  html += '</div>';

  if(progress.badges.length){
    html += '<div class="shelf-title">Badges Earned</div><div class="shelf">';
    progress.badges.forEach(b=>{
      html += `<div class="shelf-item earned"><span class="si-icon">🎖️</span>${esc(b)}</div>`;
    });
    html += '</div>';
  }

  html += `<div class="reset-row"><button class="reset-btn" id="resetBtn">Reset all progress</button></div>`;
  return html;
}

function renderDayScreen(){
  const d = DAYS[view.day-1];
  const arcClass = d.arc === 'suit' ? 'suit' : 'chakra';
  let html = `<div class="${arcClass}">`;
  html += `<button class="back-btn" id="backBtn">← Back to path</button>`;
  html += `<div class="day-header">
    <div class="day-title">Day ${d.day}: ${esc(d.title)}</div>
    <div class="day-sub">${esc(d.subtitle)}</div>
  </div>`;

  if(view.sub !== 'summary'){
    html += `<div class="day-mission">${esc(d.mission)}</div>`;
    const stages = ['flashcards','video','practice','boss'];
    const curIdx = stages.indexOf(view.sub);
    html += '<div class="levels-row">';
    stages.forEach((s,i)=>{
      let pc = 'level-pip';
      if(i < curIdx) pc += ' pastdone'; else if(i===curIdx) pc += ' active';
      html += `<div class="${pc}"></div>`;
    });
    html += '</div>';
  }

  if(view.sub === 'flashcards') html += renderFlashcards(d);
  else if(view.sub === 'video') html += renderVideo(d);
  else if(view.sub === 'practice') html += renderQuiz(d, 'Practice Mission');
  else if(view.sub === 'boss') html += renderQuiz(d, 'Boss Battle', true);
  else if(view.sub === 'summary') html += renderSummary(d);

  html += '</div>';
  return html;
}

function renderFlashcards(d){
  const total = fc.deckOrder.length;
  if(fc.idx >= total) return '<div style="text-align:center;color:#a8a6ae;">Loading next level…</div>';
  const cardData = d.flashcards[fc.deckOrder[fc.idx]];
  const q = cardData[0], a = cardData[1];
  return `
  <div class="level-label">Level 1 — Warm-Up Flashcards</div>
  <div class="flash-stage">
    <div class="fc-progress mono">${fc.idx+1} / ${total}</div>
    <div class="flashcard" id="flashcard">
      <div class="fc-tag">${fc.flipped ? 'Answer' : 'Predict, then flip'}</div>
      ${fc.flipped ? `<div class="fc-a">${esc(a)}</div>` : `<div class="fc-q">${esc(q)}</div>`}
      <div class="fc-hint">${fc.flipped ? 'How did you do?' : 'Tap the card to reveal'}</div>
    </div>
    ${fc.flipped ? `
      <div class="fc-controls">
        <button class="fc-btn miss" id="fcMiss">Missed it</button>
        <button class="fc-btn got" id="fcGot">Got it! (+10 XP)</button>
      </div>
    ` : ''}
  </div>`;
}

function renderVideo(d){
  return `
  <div class="level-label">Level 2 — Watch One Short Video</div>
  <div class="video-card">
    <div class="vc-icon">🎬</div>
    <div class="vc-label">${esc(d.video.label)}</div>
    <div class="vc-note">Opens a search so you can pick the clearest video for this topic.</div>
    <a class="primary-btn" href="${d.video.url}" target="_blank" rel="noopener">Watch the video</a><br>
    ${videoWatched ? `<button class="primary-btn" id="toPractice" style="margin-top:14px;">Continue to Practice →</button>` : `<button class="secondary-btn" id="markWatched">I watched it</button>`}
  </div>`;
}

function renderQuiz(d, label, isBoss){
  const total = quiz.list.length;
  if(quiz.idx >= total) return '<div style="text-align:center;color:#a8a6ae;">Loading…</div>';
  const q = quiz.list[quiz.idx];
  let html = `<div class="level-label">${isBoss ? 'Level 4' : 'Level 3'} — ${esc(label)}</div>`;

  if(isBoss){
    const need = bossThreshold(d);
    const pct = Math.round((quiz.idx/total)*100);
    html += `<div class="boss-meter-wrap">
      <div class="boss-meter-label"><span>Question ${quiz.idx+1} of ${total}</span><span>Need ${need} correct to win</span></div>
      <div class="boss-meter"><div class="boss-meter-fill" style="width:${pct}%;"></div></div>
    </div>`;
  } else {
    html += `<div class="quiz-progress">Question ${quiz.idx+1} of ${total}</div>`;
  }

  html += `<div class="quiz-q">${esc(q.q)}</div><div class="quiz-choices">`;
  q.choices.forEach((c,i)=>{
    let cls = 'choice-btn';
    if(quiz.showResult){
      if(i === q.correct) cls += ' correct';
      else if(i === quiz.selected) cls += ' wrong';
    }
    html += `<button class="${cls}" data-choice="${i}" ${quiz.showResult?'disabled':''}>${esc(c)}</button>`;
  });
  html += '</div>';

  if(quiz.showResult){
    const wasRight = quiz.selected === q.correct;
    html += `<div class="feedback ${wasRight?'ok':'bad'}">${wasRight ? '✅ Correct!' : '❌ Not quite — correct answer is highlighted.'}</div>`;
    html += `<button class="primary-btn" id="nextQ">${quiz.idx+1 >= total ? (isBoss ? 'Finish Battle' : 'Continue') : 'Next Question →'}</button>`;
  }
  return html;
}

function renderSummary(d){
  const need = bossThreshold(d);
  if(lastBossPassed){
    const isFinal = d.day === DAYS.length;
    return `
    <div class="summary-wrap">
      <div class="summary-icon">${isFinal ? '🏆' : '⚡'}</div>
      <div class="summary-title">${isFinal ? 'Academy Complete!' : 'Day Complete!'}</div>
      <div class="summary-sub">You scored ${quiz.correct}/${quiz.list.length} on the boss battle (needed ${need}).</div>
      <div class="xp-pill">+${lastXpGain} XP earned</div>
      ${d.specialBadge ? `<div style="margin-bottom:18px;font-size:14px;">${d.specialBadge.icon} Badge unlocked: <b>${esc(d.specialBadge.name)}</b></div>` : ''}
      ${isFinal ? `<div style="font-size:13.5px;color:var(--ink-dim);margin-bottom:18px;">He's ready for 7th grade multiplication, division, fractions, decimals, negatives, and one-step algebra. Print this as a certificate moment!</div>` : ''}
      <br><button class="primary-btn" id="toDashboard">Back to the Path</button>
    </div>`;
  } else {
    return `
    <div class="summary-wrap">
      <div class="summary-icon">🌀</div>
      <div class="summary-title">So Close!</div>
      <div class="fail-note">Scored ${quiz.correct}/${quiz.list.length} — needed ${need} to pass. No XP lost, just run it back.</div>
      <button class="primary-btn" id="retryBoss">Retry Boss Battle</button><br><br>
      <button class="secondary-btn" id="toDashboard">Back to the Path</button>
    </div>`;
  }
}

/* ============================= EVENTS ============================= */

function bindEvents(){
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = goDashboard;

  document.querySelectorAll('.node').forEach(el=>{
    el.onclick = ()=> openDay(parseInt(el.dataset.day,10));
  });

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.onclick = ()=>{
    if(confirm('Reset all XP, badges, and unlocked days? This cannot be undone.')) resetProgress();
  };

  const flashcard = document.getElementById('flashcard');
  if(flashcard) flashcard.onclick = flipCard;
  const fcMiss = document.getElementById('fcMiss'); if(fcMiss) fcMiss.onclick = ()=>markCard(false);
  const fcGot = document.getElementById('fcGot'); if(fcGot) fcGot.onclick = ()=>markCard(true);

  const markWatched = document.getElementById('markWatched');
  if(markWatched) markWatched.onclick = markVideoWatched;
  const toPractice = document.getElementById('toPractice');
  if(toPractice) toPractice.onclick = ()=>goSub('practice');

  document.querySelectorAll('.choice-btn').forEach(el=>{
    el.onclick = ()=> selectAnswer(parseInt(el.dataset.choice,10));
  });
  const nextQ = document.getElementById('nextQ');
  if(nextQ) nextQ.onclick = nextQuestion;

  const toDashboard = document.getElementById('toDashboard');
  if(toDashboard) toDashboard.onclick = goDashboard;
  const retry = document.getElementById('retryBoss');
  if(retry) retry.onclick = retryBoss;
}

loadProgress();
})();
</script>
</body>
</html>
