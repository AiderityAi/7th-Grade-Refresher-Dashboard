<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Web Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rubik:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a0d;
    --void-2:#131318;
    --panel:#1a1a21;
    --panel-2:#20202a;
    --line:#2c2c38;
    --chakra:#ff7a1a;
    --chakra-dim:#7a3d15;
    --suit:#e21b3c;
    --suit-dim:#5c0f1c;
    --book:#7e5ce6;
    --book2:#18a999;
    --gold:#ffcc3a;
    --ink:#f0eee8;
    --ink-dim:#a8a6ae;
    --ok:#3ddc84;
    --bad:#ff4d5e;
    --card-radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(255,122,26,0.12), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(226,27,60,0.10), transparent 45%),
      var(--void);
    color:var(--ink);
    font-family:'Rubik',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Bangers',cursive; letter-spacing:1px;}
  .mono{font-family:'JetBrains Mono',monospace;}

  #app{max-width:720px;margin:0 auto;padding:18px 16px 60px;}

  /* Book theme override: wraps reading screens, remaps chakra/suit vars */
  .book-theme{ --chakra: var(--book); --suit: var(--book2); --chakra-dim:#3d2f6b; --suit-dim:#0d3f39; }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:14px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand-mark{
    width:40px;height:40px;border-radius:10px;
    background:linear-gradient(145deg, var(--chakra), var(--suit));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bangers',cursive;font-size:20px;color:#0a0a0d;
    box-shadow:0 0 0 2px var(--void-2), 0 0 18px rgba(255,122,26,0.35);
    flex-shrink:0;
  }
  .brand-text .t1{font-size:11px;letter-spacing:2.5px;color:var(--ink-dim);text-transform:uppercase;}
  .brand-text .t2{font-family:'Bangers',cursive;font-size:22px;line-height:1;letter-spacing:1px;}

  .xp-wrap{text-align:right; flex-shrink:0;}
  .xp-num{font-family:'Bangers',cursive; font-size:22px; color:var(--gold); line-height:1;}
  .xp-label{font-size:10px; color:var(--ink-dim); letter-spacing:1.5px; text-transform:uppercase;}

  /* ---------- Mode Tabs ---------- */
  .tabbar{ display:flex; gap:8px; margin-bottom:16px; }
  .tab-btn{
    flex:1; text-align:center; padding:11px 8px; border-radius:12px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink-dim);
    font-weight:700; font-size:13px; cursor:pointer;
  }
  .tab-btn.active{ color:var(--ink); border-color:var(--chakra); background:rgba(255,122,26,0.12); }
  .tab-btn.active.book-tab{ border-color:var(--book); background:rgba(126,92,230,0.16); }

  /* ---------- Arc banner ---------- */
  .arc-banner{
    border-radius:14px; padding:14px 16px; margin-bottom:16px;
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line);
  }
  .arc-banner.chakra{ background:linear-gradient(120deg, rgba(255,122,26,0.16), rgba(255,122,26,0.02)); }
  .arc-banner.suit{ background:linear-gradient(120deg, rgba(226,27,60,0.18), rgba(226,27,60,0.02)); }
  .arc-icon{font-size:22px;}
  .arc-banner .arc-t{font-family:'Bangers',cursive; font-size:17px; letter-spacing:0.5px;}
  .arc-banner .arc-s{font-size:12px; color:var(--ink-dim);}

  /* ---------- Dashboard path ---------- */
  .path{
    display:flex; flex-direction:column; gap:10px; margin-bottom:20px;
  }
  .node{
    display:flex; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--card-radius); padding:12px 14px;
    cursor:pointer; transition:transform .15s ease, border-color .15s ease;
    position:relative; min-height:56px;
  }
  .node:hover{ transform:translateX(2px); }
  .node.locked{ cursor:not-allowed; opacity:0.45; }
  .node.done{ border-color:rgba(61,220,132,0.4); }
  .node.current{ border-color:var(--chakra); box-shadow:0 0 0 1px rgba(255,122,26,0.25) inset; }
  .node .num{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Bangers',cursive;font-size:17px;
    background:var(--panel-2); color:var(--ink-dim);
  }
  .node.current .num{ background:var(--chakra); color:#1a0d02; }
  .node.done .num{ background:var(--ok); color:#052b16; }
  .node .info{flex:1; min-width:0;}
  .node .info .nt{font-weight:700; font-size:14.5px;}
  .node .info .ns{font-size:11.5px; color:var(--ink-dim); margin-top:1px;}
  .node .badge-icon{font-size:18px; flex-shrink:0;}
  .node .lock-icon{font-size:15px; color:var(--ink-dim); flex-shrink:0;}

  /* ---------- Reference hub card (reading) ---------- */
  .hub-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--card-radius);
    padding:14px 16px; margin-bottom:18px; cursor:pointer; display:flex; align-items:center; gap:14px;
  }
  .hub-card .hub-icon{font-size:26px;}
  .hub-card .hub-t{font-weight:800; font-size:14.5px;}
  .hub-card .hub-s{font-size:11.5px; color:var(--ink-dim);}

  /* ---------- Reward shelf ---------- */
  .shelf-title{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); margin:22px 0 10px;}
  .shelf{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px;}
  .shelf-item{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 6px; text-align:center; font-size:10.5px; color:var(--ink-dim);
  }
  .shelf-item.earned{ border-color:var(--gold); color:var(--ink); background:rgba(255,204,58,0.08); }
  .shelf-item .si-icon{font-size:20px; display:block; margin-bottom:4px;}

  .reset-row{ text-align:center; margin-top:26px; }
  .reset-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    padding:8px 14px; border-radius:20px; font-size:11.5px; cursor:pointer;
  }

  /* ---------- Day view ---------- */
  .day-header{ margin-bottom:16px; }
  .back-btn{
    background:none;border:none;color:var(--ink-dim); font-size:13px;
    cursor:pointer; padding:4px 0; margin-bottom:8px; display:flex; align-items:center; gap:6px;
  }
  .day-title{ font-family:'Bangers',cursive; font-size:28px; line-height:1.05; margin:2px 0 2px; }
  .day-sub{ font-size:12.5px; color:var(--ink-dim); }
  .day-mission{ font-size:13.5px; margin-top:8px; color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }

  .levels-row{ display:flex; gap:6px; margin:16px 0 18px; }
  .level-pip{ flex:1; height:6px; border-radius:4px; background:var(--panel-2); }
  .level-pip.active{ background:var(--chakra); }
  .level-pip.pastdone{ background:var(--ok); }

  .level-label{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px; }

  /* ---------- Adaptive Flashcard ---------- */
  .flash-stage{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .bonus-tag{
    display:inline-block; background:rgba(255,204,58,0.16); color:var(--gold);
    border:1px solid rgba(255,204,58,0.4); border-radius:20px; padding:4px 12px;
    font-size:11px; font-weight:700;
  }
  .flashcard{
    width:100%; max-width:440px; min-height:120px; border-radius:20px;
    background:linear-gradient(160deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; position:relative;
  }
  .flashcard .fc-q{ font-family:'Bangers',cursive; font-size:27px; letter-spacing:0.5px; }
  .fc-progress{ font-size:12px; color:var(--ink-dim); }
  .fc-attempts{ font-size:11.5px; color:var(--ink-dim); }
  .fc-input-row{ display:flex; gap:8px; width:100%; max-width:440px; }
  .fc-input{
    flex:1; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--ink); font-size:16px; font-family:'JetBrains Mono',monospace;
  }
  .fc-input:focus{ outline:none; border-color:var(--chakra); }
  .fc-submit{
    padding:13px 20px; border-radius:12px; border:none; background:var(--chakra);
    color:#1a0d02; font-weight:800; cursor:pointer; font-size:14px;
  }
  .fc-feedback{ font-size:13px; font-weight:700; width:100%; max-width:440px; }
  .fc-feedback.ok{ color:var(--ok); }
  .fc-feedback.bad{ color:var(--bad); }
  .fc-hintbox{
    width:100%; max-width:440px; background:rgba(255,204,58,0.1); border:1px solid rgba(255,204,58,0.35);
    border-radius:12px; padding:11px 13px; font-size:12.5px; color:var(--ink); line-height:1.5;
  }
  .fc-hintbox .hb-title{ font-weight:800; color:var(--gold); font-size:10.5px; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
  .fc-solutionbox{
    width:100%; max-width:440px; background:var(--panel-2); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; font-size:12.8px; line-height:1.6;
  }
  .fc-solutionbox .ss-title{ font-weight:800; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
  .fc-solutionbox ol{ margin:0; padding-left:20px; }
  .fc-solutionbox li{ margin-bottom:5px; }
  .fc-verify-title{ font-size:12.5px; color:var(--ink-dim); width:100%; max-width:440px; }
  .skip-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    padding:10px 16px; border-radius:10px; font-size:12.5px; cursor:pointer;
  }
  .fc-btnrow{ display:flex; gap:10px; width:100%; max-width:440px; }

  /* Video */
  .video-card{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px; text-align:center; }
  .video-card .vc-icon{ font-size:34px; margin-bottom:8px; }
  .video-card .vc-label{ font-family:'Bangers',cursive; font-size:20px; margin-bottom:6px; }
  .video-card .vc-note{ font-size:12.5px; color:var(--ink-dim); margin-bottom:16px; }
  .primary-btn{
    display:inline-flex; align-items:center; justify-content:center; background:var(--chakra); color:#1a0d02; text-decoration:none;
    font-weight:800; padding:13px 20px; border-radius:12px; font-size:14px; border:none; cursor:pointer; min-height:46px;
  }
  .secondary-btn{
    display:inline-flex; align-items:center; justify-content:center; background:var(--panel-2); color:var(--ink); text-decoration:none;
    font-weight:700; padding:13px 20px; border-radius:12px; font-size:14px; border:1px solid var(--line); cursor:pointer; margin-top:10px; min-height:46px;
  }

  /* Quiz (practice + boss + reading) */
  .quiz-q{ font-size:16.5px; font-weight:700; margin-bottom:14px; line-height:1.4; }
  .quiz-choices{ display:flex; flex-direction:column; gap:9px; margin-bottom:14px;}
  .choice-btn{
    text-align:left; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:14.5px; cursor:pointer; font-family:'Rubik',sans-serif; min-height:48px;
  }
  .choice-btn.correct{ border-color:var(--ok); background:rgba(61,220,132,0.14); }
  .choice-btn.wrong{ border-color:var(--bad); background:rgba(255,77,94,0.14); }
  .choice-btn:disabled{ cursor:default; }
  .quiz-progress{ font-size:12px; color:var(--ink-dim); margin-bottom:10px; }
  .feedback{ font-size:13px; margin-bottom:12px; font-weight:700; }
  .feedback.ok{ color:var(--ok); }
  .feedback.bad{ color:var(--bad); }

  .boss-meter-wrap{ margin-bottom:16px; }
  .boss-meter-label{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-dim); margin-bottom:5px; }
  .boss-meter{ height:10px; border-radius:6px; background:var(--panel-2); overflow:hidden; border:1px solid var(--line); }
  .boss-meter-fill{ height:100%; background:linear-gradient(90deg, var(--suit), var(--chakra)); transition:width .3s ease; }

  /* Reading specific */
  .recap-card{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px 18px; font-size:14px; line-height:1.6; margin-bottom:14px; }
  .vocab-card{ background:rgba(126,92,230,0.1); border:1px solid rgba(126,92,230,0.35); border-radius:14px; padding:13px 15px; margin-bottom:16px; }
  .vocab-card .v-term{ font-weight:800; font-size:13.5px; color:var(--book); margin-bottom:3px; }
  .vocab-card .v-def{ font-size:12.8px; color:var(--ink); line-height:1.5; }
  .challenge-card{ background:var(--panel); border:1px dashed var(--book); border-radius:14px; padding:16px 18px; font-size:14px; line-height:1.6; margin-bottom:16px; }
  .challenge-card .ch-tag{ font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--book); font-weight:800; margin-bottom:6px; }
  .ref-section{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px 18px; margin-bottom:14px; }
  .ref-section h3{ font-family:'Bangers',cursive; font-size:19px; margin:0 0 10px; letter-spacing:0.5px; color:var(--book); }
  .ref-section p{ font-size:13.5px; line-height:1.65; margin:0 0 8px; }
  .char-row{ display:flex; gap:10px; margin-bottom:10px; }
  .char-row .cname{ font-weight:800; font-size:13px; flex-shrink:0; width:150px; }
  .char-row .cdesc{ font-size:12.8px; color:var(--ink-dim); line-height:1.5; }
  .glossary-item{ margin-bottom:9px; }
  .glossary-item b{ color:var(--book); }
  .fact-item{ font-size:13px; margin-bottom:7px; padding-left:16px; position:relative; }
  .fact-item::before{ content:"✦"; position:absolute; left:0; color:var(--book2); }
  .quote-box{ background:rgba(24,169,153,0.1); border:1px solid rgba(24,169,153,0.35); border-radius:14px; padding:16px 18px; text-align:center; }
  .quote-box .qq{ font-family:'Bangers',cursive; font-size:20px; color:var(--book2); }
  .quote-box .qa{ font-size:11.5px; color:var(--ink-dim); margin-top:6px; }

  /* Summary */
  .summary-wrap{ text-align:center; padding:20px 10px; }
  .summary-icon{ font-size:52px; margin-bottom:10px; }
  .summary-title{ font-family:'Bangers',cursive; font-size:30px; margin-bottom:6px; }
  .summary-sub{ font-size:13.5px; color:var(--ink-dim); margin-bottom:18px; }
  .xp-pill{
    display:inline-block; background:rgba(255,204,58,0.14); border:1px solid rgba(255,204,58,0.4);
    color:var(--gold); font-weight:800; padding:8px 16px; border-radius:20px; font-size:14px; margin-bottom:20px;
  }
  .fail-note{ font-size:13px; color:var(--bad); margin-bottom:16px; }

  ::selection{ background:var(--chakra); color:#1a0d02; }
  a{ color:inherit; }

  /* ---------- Mobile ---------- */
  @media (max-width:480px){
    #app{ padding:12px 10px 50px; }
    .topbar{ margin-bottom:12px; }
    .brand-mark{ width:34px;height:34px;font-size:16px;border-radius:8px; }
    .brand-text .t1{ font-size:9px; letter-spacing:1.8px; }
    .brand-text .t2{ font-size:18px; }
    .xp-num{ font-size:19px; }
    .xp-label{ font-size:9px; }
    .tab-btn{ font-size:12px; padding:10px 6px; }
    .arc-banner{ padding:11px 12px; }
    .node{ padding:11px 12px; gap:10px; border-radius:13px; }
    .node .num{ width:32px;height:32px;font-size:14px;border-radius:8px; }
    .node .info .nt{ font-size:13.5px; }
    .node .info .ns{ font-size:10.5px; }
    .shelf{ grid-template-columns:repeat(2,1fr); gap:7px; }
    .shelf-item{ font-size:11px; padding:10px 6px; }
    .day-title{ font-size:23px; }
    .day-mission{ font-size:12.5px; padding:9px 11px; }
    .flashcard{ min-height:110px; padding:20px 16px; }
    .flashcard .fc-q{ font-size:22px; }
    .fc-input-row{ flex-direction:column; }
    .fc-btnrow{ flex-direction:column; }
    .video-card{ padding:18px 14px; }
    .quiz-q{ font-size:15.5px; }
    .choice-btn{ font-size:13.5px; padding:12px 13px; }
    .primary-btn, .secondary-btn{ width:100%; padding:13px 16px; font-size:13.5px; }
    .summary-title{ font-size:25px; }
    .char-row{ flex-direction:column; gap:2px; }
    .char-row .cname{ width:auto; }
  }
  @media (max-width:360px){
    .shelf{ grid-template-columns:repeat(2,1fr); }
    .node .info .nt{ font-size:12.5px; }
    .flashcard .fc-q{ font-size:20px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){

/* ============================================================
   HELPERS
   ============================================================ */
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function esc(s){ return String(s); }
function parseNum(str){
  if(str==null) return NaN;
  let s = String(str).trim().replace(/\$/g,'').replace(/,/g,'').replace(/\u2212/g,'-');
  return parseFloat(s);
}
function parseFrac(str){
  if(str==null) return null;
  let s = String(str).trim().replace(/\s+/g,'');
  let m = s.match(/^(-?\d+)\/(\d+)$/);
  if(m) return { n: parseInt(m[1],10), d: parseInt(m[2],10) };
  let m2 = s.match(/^(-?\d+(?:\.\d+)?)$/);
  if(m2) return { n: parseFloat(m2[1]), d: 1 };
  return null;
}
function fracVal(f){ return f.n/f.d; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ============================================================
   ADAPTIVE FLASHCARD ENGINE (GEN)
   Each type exposes: q(p), display(p), check(p,input), hints(p), steps(p), harder(p), similar(p)
   ============================================================ */
const GEN = {
  mult: {
    q(p){ return `${p.a} × ${p.b} = ?`; },
    val(p){ return p.a*p.b; },
    display(p){ return String(p.a*p.b); },
    check(p, input){ const v=parseNum(input); return !isNaN(v) && Math.abs(v-p.a*p.b)<0.001; },
    hints(p){
      const half=Math.floor(p.b/2), rest=p.b-half;
      return [
        `Think of ${p.a} × ${p.b} as ${p.a} groups of ${p.b}.`,
        `Split it up: ${p.a} × ${half} = ${p.a*half}, and ${p.a} × ${rest} = ${p.a*rest}. Add those two answers together.`
      ];
    },
    steps(p){
      const half=Math.floor(p.b/2), rest=p.b-half;
      return [
        `We want ${p.a} × ${p.b}.`,
        `Break ${p.b} into ${half} + ${rest}.`,
        `${p.a} × ${half} = ${p.a*half}`,
        `${p.a} × ${rest} = ${p.a*rest}`,
        `Add the pieces: ${p.a*half} + ${p.a*rest} = ${p.a*p.b}`
      ];
    },
    harder(p){ return { a: clamp(p.a+rand(1,3),6,15), b: clamp(p.b+rand(1,3),6,15) }; },
    similar(p){ return { a: rand(6,12), b: rand(6,12) }; }
  },
  div: {
    q(p){ return `${p.a} ÷ ${p.b} = ?`; },
    display(p){ return String(p.a/p.b); },
    check(p, input){ const v=parseNum(input); return !isNaN(v) && Math.abs(v-p.a/p.b)<0.001; },
    hints(p){
      return [
        `Ask yourself: ${p.b} times what number equals ${p.a}?`,
        `Try counting up by ${p.b}s: ${p.b}, ${p.b*2}, ${p.b*3}... until you reach ${p.a}.`
      ];
    },
    steps(p){
      const k=p.a/p.b;
      return [
        `We're asking: ${p.b} × ? = ${p.a}`,
        `Count up by ${p.b}s until you hit ${p.a}.`,
        `${p.b} × ${k} = ${p.a}`,
        `So ${p.a} ÷ ${p.b} = ${k}`
      ];
    },
    harder(p){ const b=clamp(p.b+rand(1,2),6,12); const k=clamp(Math.round(p.a/p.b)+rand(1,2),6,12); return {a:b*k, b}; },
    similar(p){ const b=rand(6,11); const k=rand(6,11); return {a:b*k, b}; }
  },
  fracCompare: {
    q(p){ return `Which is bigger: ${p.n1}/${p.d1} or ${p.n2}/${p.d2}?`; },
    biggerVal(p){ return (p.n1/p.d1) >= (p.n2/p.d2) ? p.n1/p.d1 : p.n2/p.d2; },
    biggerStr(p){ return (p.n1/p.d1) >= (p.n2/p.d2) ? `${p.n1}/${p.d1}` : `${p.n2}/${p.d2}`; },
    display(p){ return this.biggerStr(p); },
    check(p, input){ const f=parseFrac(input); if(!f) return false; return Math.abs(fracVal(f)-this.biggerVal(p))<0.01; },
    hints(p){
      return [
        `Turn both into decimals: ${p.n1}/${p.d1} ≈ ${(p.n1/p.d1).toFixed(2)}, and ${p.n2}/${p.d2} ≈ ${(p.n2/p.d2).toFixed(2)}.`,
        `Whichever decimal is bigger is the bigger fraction.`
      ];
    },
    steps(p){
      return [
        `${p.n1}/${p.d1} ≈ ${(p.n1/p.d1).toFixed(2)}`,
        `${p.n2}/${p.d2} ≈ ${(p.n2/p.d2).toFixed(2)}`,
        `${this.biggerStr(p)} is the larger fraction.`
      ];
    },
    harder(p){ const pool=[[5,6,7,8],[3,4,4,5],[7,8,5,6],[5,9,4,7],[7,10,4,5]]; const c=pool[rand(0,pool.length-1)]; return {n1:c[0],d1:c[1],n2:c[2],d2:c[3]}; },
    similar(p){ return this.harder(p); }
  },
  fracEquiv: {
    q(p){ return `Which fraction equals the same amount as ${p.n}/${p.d}?`; },
    display(p){ return `${p.n*2}/${p.d*2}`; },
    check(p, input){ const f=parseFrac(input); if(!f||f.d===0||f.n===0) return false; return Math.abs(f.n*p.d - p.n*f.d) < 0.001; },
    hints(p){
      return [
        `Multiply the top number and the bottom number by the same number.`,
        `Try multiplying both by 2: ${p.n} × 2 = ${p.n*2}, and ${p.d} × 2 = ${p.d*2}.`
      ];
    },
    steps(p){
      return [
        `Pick a number to multiply by, like 2.`,
        `${p.n} × 2 = ${p.n*2}`,
        `${p.d} × 2 = ${p.d*2}`,
        `So ${p.n*2}/${p.d*2} is the same amount as ${p.n}/${p.d}.`
      ];
    },
    harder(p){ const pool=[[3,7],[4,9],[5,7],[2,9],[3,10]]; const c=pool[rand(0,pool.length-1)]; return {n:c[0], d:c[1]}; },
    similar(p){ return this.harder(p); }
  },
  fracAdd: {
    q(p){ return `${p.n1}/${p.d} + ${p.n2}/${p.d} = ?`; },
    display(p){ return `${p.n1+p.n2}/${p.d}`; },
    check(p, input){ const f=parseFrac(input); if(!f||f.d===0) return false; return Math.abs(fracVal(f)-(p.n1+p.n2)/p.d)<0.01; },
    hints(p){
      return [
        `The bottom numbers already match, so you only need to add the top numbers.`,
        `${p.n1} + ${p.n2} = ${p.n1+p.n2}. Keep the bottom number as ${p.d}.`
      ];
    },
    steps(p){
      return [
        `Bottom numbers match (${p.d}), so just add the tops.`,
        `${p.n1} + ${p.n2} = ${p.n1+p.n2}`,
        `Answer: ${p.n1+p.n2}/${p.d}`
      ];
    },
    harder(p){ const pool=[[3,4,9],[2,5,8],[4,3,10],[5,4,11],[3,5,12]]; const c=pool[rand(0,pool.length-1)]; return {n1:c[0], n2:c[1], d:c[2]}; },
    similar(p){ return this.harder(p); }
  },
  decimal: {
    q(p){ const fmt=v=>p.money?`$${v.toFixed(2)}`:`${v}`; return `${fmt(p.a)} ${p.op} ${fmt(p.b)} = ?`; },
    val(p){ return p.op==='+' ? p.a+p.b : p.a-p.b; },
    display(p){ const v=this.val(p); return p.money?`$${v.toFixed(2)}`:String(Math.round(v*100)/100); },
    check(p, input){ const v=parseNum(input); return !isNaN(v) && Math.abs(v-this.val(p))<0.01; },
    hints(p){
      return [
        `Line up the decimal points, just like lining up ones, tens, and hundreds.`,
        `${p.op==='+'?'Add':'Subtract'} column by column, then bring the decimal point straight down.`
      ];
    },
    steps(p){
      return [
        `Line up ${p.a} and ${p.b} by their decimal points.`,
        `${p.op==='+'?'Add':'Subtract'} starting from the right-most column.`,
        `Answer: ${this.display(p)}`
      ];
    },
    harder(p){ return { a:+(p.a+rand(1,3)+0.05).toFixed(2), b:+(p.b+rand(1,2)+0.1).toFixed(2), op:p.op, money:p.money }; },
    similar(p){ return this.harder(p); }
  },
  negative: {
    q(p){ return `${p.a} ${p.op} ${p.b} = ?`; },
    val(p){ return p.op==='+' ? p.a+p.b : p.a-p.b; },
    display(p){ return String(this.val(p)); },
    check(p, input){ const v=parseNum(input); return !isNaN(v) && Math.abs(v-this.val(p))<0.001; },
    hints(p){
      return [
        `Picture a number line. Start at ${p.a}.`,
        p.op==='+' ? `Moving by ${p.b} means stepping ${p.b>=0?'right':'left'} ${Math.abs(p.b)} spaces.` : `Subtracting ${p.b} means stepping left ${Math.abs(p.b)} spaces from ${p.a}.`
      ];
    },
    steps(p){
      return [
        `Start at ${p.a} on the number line.`,
        p.op==='+' ? `Move ${Math.abs(p.b)} spaces ${p.b>=0?'right':'left'}.` : `Subtracting is the same as adding the opposite, so move ${Math.abs(p.b)} spaces left.`,
        `You land on ${this.val(p)}.`
      ];
    },
    harder(p){ return { a: p.a + (p.a<0?-rand(1,3):rand(1,3)), b: p.b + rand(1,3), op:p.op }; },
    similar(p){ return { a:-rand(2,10), b: rand(2,10)*(Math.random()<0.5?-1:1), op: Math.random()<0.5?'+':'-' }; }
  },
  oneStep: {
    q(p){
      if(p.kind==='addEq') return `x + ${p.add} = ${p.result}`;
      if(p.kind==='subEq') return `x − ${p.sub} = ${p.result}`;
      if(p.kind==='mulEq') return `${p.coef}x = ${p.result}`;
      if(p.kind==='divEq') return `x / ${p.coef} = ${p.result}`;
    },
    val(p){
      if(p.kind==='addEq') return p.result-p.add;
      if(p.kind==='subEq') return p.result+p.sub;
      if(p.kind==='mulEq') return p.result/p.coef;
      if(p.kind==='divEq') return p.result*p.coef;
    },
    display(p){ return String(this.val(p)); },
    check(p, input){ let s=String(input).trim().replace(/^x\s*=\s*/i,''); const v=parseNum(s); return !isNaN(v) && Math.abs(v-this.val(p))<0.001; },
    hints(p){
      if(p.kind==='addEq') return [`To get x alone, undo the "+ ${p.add}" by subtracting ${p.add} from both sides.`, `${p.result} − ${p.add} = ?`];
      if(p.kind==='subEq') return [`To get x alone, undo the "− ${p.sub}" by adding ${p.sub} to both sides.`, `${p.result} + ${p.sub} = ?`];
      if(p.kind==='mulEq') return [`To get x alone, undo the "× ${p.coef}" by dividing both sides by ${p.coef}.`, `${p.result} ÷ ${p.coef} = ?`];
      if(p.kind==='divEq') return [`To get x alone, undo the "÷ ${p.coef}" by multiplying both sides by ${p.coef}.`, `${p.result} × ${p.coef} = ?`];
    },
    steps(p){
      if(p.kind==='addEq') return [`x + ${p.add} = ${p.result}`, `Subtract ${p.add} from both sides.`, `x = ${p.result} − ${p.add} = ${this.val(p)}`];
      if(p.kind==='subEq') return [`x − ${p.sub} = ${p.result}`, `Add ${p.sub} to both sides.`, `x = ${p.result} + ${p.sub} = ${this.val(p)}`];
      if(p.kind==='mulEq') return [`${p.coef}x = ${p.result}`, `Divide both sides by ${p.coef}.`, `x = ${p.result} ÷ ${p.coef} = ${this.val(p)}`];
      if(p.kind==='divEq') return [`x / ${p.coef} = ${p.result}`, `Multiply both sides by ${p.coef}.`, `x = ${p.result} × ${p.coef} = ${this.val(p)}`];
    },
    harder(p){
      const bump=rand(2,4);
      if(p.kind==='addEq') return {kind:'addEq', add:p.add+bump, result:p.result+bump*2};
      if(p.kind==='subEq') return {kind:'subEq', sub:p.sub+bump, result:p.result+bump};
      if(p.kind==='mulEq') return {kind:'mulEq', coef:p.coef, result:p.result+p.coef*bump};
      if(p.kind==='divEq') return {kind:'divEq', coef:p.coef, result:p.result+bump};
    },
    similar(p){ return this.harder(p); }
  },
  manual: {
    q(p){ return p.q; },
    display(p){ return String(p.answer); },
    check(p, input){
      if(typeof p.answer === 'string' && p.answer.indexOf('/')>-1){
        const f=parseFrac(input); if(!f) return false;
        const target=parseFrac(p.answer);
        return Math.abs(fracVal(f)-fracVal(target))<0.01;
      }
      const v=parseNum(input); const t=parseNum(p.answer);
      return !isNaN(v) && Math.abs(v-t)<0.01;
    },
    hints(p){ return p.hints; },
    steps(p){ return p.steps; },
    harder(p){ return null; },
    similar(p){ return p; }
  }
};

   ============================================================ */
const STORAGE_KEY = "shadow-web-academy-progress";
let progress = { xp:0, unlockedDay:1, completedDays:{}, badges:[], readingUnlockedDay:1, readingCompletedDays:{} };
let ready = false;

let view = { mode:'math', screen:'dashboard', day:null, sub:'flashcards' };

// math flashcard engine state
let fc = null;
// math practice/boss quiz state
let quiz = { idx:0, correct:0, selected:null, showResult:false, list:[] };
let videoWatched = false;
let lastBossPassed = null;
let lastXpGain = 0;

// reading state
let rquiz = { idx:0, correct:0, selected:null, showResult:false, list:[] };
let challengeChecked = false;

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const loaded = JSON.parse(res.value);
      progress = Object.assign({ xp:0, unlockedDay:1, completedDays:{}, badges:[], readingUnlockedDay:1, readingCompletedDays:{} }, loaded);
    }
  }catch(e){ /* no saved progress yet */ }
  ready = true;
  render();
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(progress), false); }catch(e){}
}

   NAV
   ============================================================ */
function switchMode(mode){ view = { mode, screen:'dashboard', day:null, sub:'flashcards' }; render(); }
function goDashboard(){ view = { mode:view.mode, screen:'dashboard', day:null, sub:'flashcards' }; render(); }

function openMathDay(dayNum){
  if(dayNum > progress.unlockedDay) return;
  view = { mode:'math', screen:'day', day:dayNum, sub:'flashcards' };

  fc = {
    deck: d.flashcards.map(c=>({ type:c.type, params: JSON.parse(JSON.stringify(c.params)) })),
    idx:0, attempts:0, hintsShown:0, showSolution:false, verifying:false,
    verifyType:null, verifyParams:null, verifyWrong:false, escalations:0, input:''
  };
  videoWatched = false;
  render();
}

function goMathSub(sub){
  const d = DAYS[view.day-1];
  view.sub = sub;
  if(sub==='practice') quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.practice };
  else if(sub==='boss') quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.boss };

}

  if(dayNum > progress.readingUnlockedDay) return;
  view = { mode:'reading', screen:'day', day:dayNum, sub:'recap' };

/* ============================================================
   MATH FLASHCARD ACTIONS
   ============================================================ */
function fcSubmit(inputValue){
  const entry = fc.deck[fc.idx];
  const type = entry.type, params = entry.params;

  if(fc.verifying){
    const vType = fc.verifyType, vParams = fc.verifyParams;
    const vCorrect = GEN[vType].check(vParams, inputValue);
    if(vCorrect){
      progress.xp += 5; lastXpGain = 5; saveProgress();
      fcAdvance();
    } else {
      fc.verifyWrong = true;
      render();
    }
    return;
  }

  const correct = GEN[type].check(params, inputValue);
  if(correct){
    const firstTry = fc.attempts===0;
    const gained = firstTry ? 10 : 7;
    progress.xp += gained; lastXpGain = gained; saveProgress();

    if(firstTry && fc.escalations<2 && GEN[type].harder){
      let hcard = null;
      if(type==='manual'){
        const d = DAYS[view.day-1];
        if(d.bonusPool && d.bonusPool.length){
          const bp = d.bonusPool.shift();
          hcard = { type:'manual', params: bp, isBonus:true };
        }
      } else {
        const hp = GEN[type].harder(params);
        if(hp) hcard = { type, params: hp, isBonus:true };
      }
      if(hcard){ fc.deck.splice(fc.idx+1, 0, hcard); fc.escalations++; }
    }
    fcAdvance();
  } else {
    fc.attempts++;
    if(fc.attempts < 4){
      fc.hintsShown = Math.min(fc.attempts, GEN[type].hints(params).length);
      render();
    } else {
      fc.showSolution = true;
      const sim = GEN[type].similar ? GEN[type].similar(params) : params;
      fc.verifying = true;
      fc.verifyType = type;
      fc.verifyParams = sim;
      fc.verifyWrong = false;
      render();
    }
  }
}

function fcAdvance(){
  fc.idx++;
  fc.attempts = 0; fc.hintsShown = 0; fc.showSolution = false;
  fc.verifying = false; fc.verifyWrong = false; fc.input = '';
  if(fc.idx >= fc.deck.length){
    goMathSub('video');
    return;
  }
  render();
}

function fcSkip(){ fcAdvance(); }

function markVideoWatched(){ videoWatched = true; render(); }

/* ============================================================
   MATH PRACTICE / BOSS QUIZ ACTIONS
   ============================================================ */
function selectAnswer(choiceIdx){
  if(quiz.showResult) return;
  const q = quiz.list[quiz.idx];
  quiz.selected = choiceIdx;
  quiz.showResult = true;
  if(choiceIdx === q.correct) quiz.correct++;
  render();
}
function nextQuestion(){
  quiz.idx++; quiz.selected = null; quiz.showResult = false;
  if(quiz.idx >= quiz.list.length){
    if(view.sub === 'practice'){
      progress.xp += 30; lastXpGain = 30; saveProgress();
      goMathSub('boss');
    } else if(view.sub === 'boss'){
      finishBoss();
    }
    return;
  }
  render();
}
function finishBoss(){
  const d = DAYS[view.day-1];
  const need = bossThreshold(d);
  const passed = quiz.correct >= need;
  lastBossPassed = passed;
  if(passed){
    const perfect = quiz.correct === quiz.list.length;
    const gained = perfect ? 100 : 50;
    progress.xp += gained; lastXpGain = gained;
    if(!progress.completedDays[d.day]){
      progress.completedDays[d.day] = true;
      progress.xp += 50; lastXpGain += 50;
    }
    if(d.specialBadge && !progress.badges.includes(d.specialBadge.name)) progress.badges.push(d.specialBadge.name);
    if(progress.unlockedDay === d.day && d.day < DAYS.length) progress.unlockedDay = d.day + 1;
    saveProgress();
  }
  view.sub = 'summary';
  render();
}
function retryBoss(){
  const d = DAYS[view.day-1];
  quiz = { idx:0, correct:0, selected:null, showResult:false, list:d.boss };
  view.sub = 'boss';
  render();
}

/* ============================================================
   READING ACTIONS
   ============================================================ */
function rSelectAnswer(choiceIdx){
  if(rquiz.showResult) return;
  const q = rquiz.list[rquiz.idx];
  rquiz.selected = choiceIdx;
  rquiz.showResult = true;
  if(choiceIdx === q.correct){ rquiz.correct++; progress.xp += 10; lastXpGain = 10; saveProgress(); }
  render();
}
function rNextQuestion(){
  rquiz.idx++; rquiz.selected = null; rquiz.showResult = false;
  if(rquiz.idx >= rquiz.list.length){ goReadingSub('challenge'); return; }
  render();
}
function markChallengeDone(){
  challengeChecked = true;
  const rd = READING_DAYS[view.day-1];
  progress.xp += 20; lastXpGain = 20;
  if(!progress.readingCompletedDays[rd.day]){
    progress.readingCompletedDays[rd.day] = true;
  }
  if(rd.specialBadge && !progress.badges.includes(rd.specialBadge.name)) progress.badges.push(rd.specialBadge.name);
  if(progress.readingUnlockedDay === rd.day && rd.day < READING_DAYS.length) progress.readingUnlockedDay = rd.day + 1;
  saveProgress();
  goReadingSub('summary');
}

async function resetProgress(){
  progress = { xp:0, unlockedDay:1, completedDays:{}, badges:[], readingUnlockedDay:1, readingCompletedDays:{} };
  await saveProgress();
  goDashboard();
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  if(!ready){ app.innerHTML = '<div style="text-align:center;padding:80px 0;color:#a8a6ae;">Loading your academy…</div>'; return; }

  let html = '';
  html += renderTopbar();
  html += renderTabs();

  const bookWrap = view.mode==='reading';
  html += bookWrap ? '<div class="book-theme">' : '';

  if(view.mode==='math'){
    if(view.screen==='dashboard') html += renderMathDashboard();
    else html += renderMathDayScreen();
  } else {
    if(view.screen==='dashboard') html += renderReadingDashboard();
    else if(view.screen==='hub') html += renderReadingHub();
    else html += renderReadingDayScreen();
  }

  html += bookWrap ? '</div>' : '';

  app.innerHTML = html;
  bindEvents();
}

  return `
  <div class="topbar">

}

}

/* ---------------- MATH: DASHBOARD ---------------- */
function renderMathDashboard(){
  let html = '<div class="path">';
  DAYS.forEach(d=>{
    const done = !!progress.completedDays[d.day];
    const locked = d.day > progress.unlockedDay;
    const current = d.day === progress.unlockedDay && !done;
    let cls = 'node';
    if(locked) cls += ' locked'; else if(done) cls += ' done'; else if(current) cls += ' current';
    html += `<div class="${cls}" data-mday="${d.day}">
      <div class="num">${done ? '✓' : d.day}</div>
      <div class="info"><div class="nt">${esc(d.title)}</div><div class="ns">${esc(d.subtitle)}</div></div>
      ${d.specialBadge ? `<div class="badge-icon">${d.specialBadge.icon}</div>` : ''}
      ${locked ? '<div class="lock-icon">🔒</div>' : ''}
    </div>`;
  });
  html += '</div>';

  html += '<div class="shelf-title">Real-World Reward Shelf</div><div class="shelf">';
  REWARDS.forEach(r=>{
    const earned = progress.xp >= r.xp;
    html += `<div class="shelf-item ${earned?'earned':''}"><span class="si-icon">${r.icon}</span>${r.label}<br><span class="mono">${r.xp} XP</span></div>`;
  });
  html += '</div>';

  if(progress.badges.length){
    html += '<div class="shelf-title">Badges Earned</div><div class="shelf">';
    progress.badges.forEach(b=>{ html += `<div class="shelf-item earned"><span class="si-icon">🎖️</span>${esc(b)}</div>`; });
    html += '</div>';
  }

  html += `<div class="reset-row"><button class="reset-btn" id="resetBtn">Reset all progress</button></div>`;
  return html;
}

/* ---------------- MATH: DAY SCREEN ---------------- */
function renderMathDayScreen(){
  const d = DAYS[view.day-1];
  const arcClass = d.arc === 'suit' ? 'suit' : 'chakra';
  let html = `<div class="${arcClass}">`;
  html += `<button class="back-btn" id="backBtn">← Back to path</button>`;
  html += `<div class="day-header"><div class="day-title">Day ${d.day}: ${esc(d.title)}</div><div class="day-sub">${esc(d.subtitle)}</div></div>`;

  if(view.sub !== 'summary'){
    html += `<div class="day-mission">${esc(d.mission)}</div>`;
    const stages = ['flashcards','video','practice','boss'];
    const curIdx = stages.indexOf(view.sub);
    html += '<div class="levels-row">';
    stages.forEach((s,i)=>{
      let pc = 'level-pip';
      if(i < curIdx) pc += ' pastdone'; else if(i===curIdx) pc += ' active';
      html += `<div class="${pc}"></div>`;
    });
    html += '</div>';
  }

  if(view.sub === 'flashcards') html += renderFlashcards(d);
  else if(view.sub === 'video') html += renderVideo(d);
  else if(view.sub === 'practice') html += renderMathQuiz(d, 'Practice Mission');
  else if(view.sub === 'boss') html += renderMathQuiz(d, 'Boss Battle', true);
  else if(view.sub === 'summary') html += renderMathSummary(d);

  html += '</div>';
  return html;
}

function renderFlashcards(d){
  const total = fc.deck.length;
  if(fc.idx >= total) return '<div style="text-align:center;color:#a8a6ae;">Loading next level…</div>';
  const entry = fc.deck[fc.idx];
  const type = entry.type, params = entry.params;
  const gen = GEN[type];
  const qText = gen.q(params);

  let html = '<div class="level-label">Level 1 — Adaptive Flashcards</div><div class="flash-stage">';
  html += `<div class="fc-progress mono">Card ${fc.idx+1} / ${total}</div>`;
  if(entry.isBonus) html += `<div class="bonus-tag">🔥 Bonus Challenge — you unlocked this!</div>`;

  html += `<div class="flashcard"><div class="fc-q">${esc(qText)}</div></div>`;

  if(fc.verifying){
    const vGen = GEN[fc.verifyType];
    html += `<div class="fc-solutionbox"><div class="ss-title">How to Solve It</div><ol>`;
    gen.steps(params).forEach(s=> html += `<li>${esc(s)}</li>`);
    html += `</ol></div>`;
    html += `<div class="fc-verify-title">Quick check — try one just like it to make sure it clicked:</div>`;
    html += `<div class="flashcard"><div class="fc-q">${esc(vGen.q(fc.verifyParams))}</div></div>`;
    if(fc.verifyWrong){
      html += `<div class="fc-feedback bad">That wasn't quite it — the answer is <b>${esc(vGen.display(fc.verifyParams))}</b>. No worries, let's keep moving.</div>`;
      html += `<div class="fc-btnrow"><button class="primary-btn" id="fcContinueAfterVerify">Continue →</button></div>`;
    } else {
      html += `<div class="fc-input-row"><input type="text" class="fc-input" id="fcVerifyInput" placeholder="Type your answer" autocomplete="off"><button class="fc-submit" id="fcVerifySubmit">Check</button></div>`;
      html += `<div class="fc-btnrow"><button class="skip-btn" id="fcSkipBtn">Skip for now →</button></div>`;
    }
  } else {
    html += `<div class="fc-input-row"><input type="text" class="fc-input" id="fcInput" placeholder="Type your answer" autocomplete="off"><button class="fc-submit" id="fcSubmitBtn">Check</button></div>`;
    if(fc.attempts > 0 && fc.attempts < 4){
      html += `<div class="fc-attempts">Attempt ${fc.attempts} of 4 — not quite, here's a nudge:</div>`;
      html += `<div class="fc-hintbox"><div class="hb-title">Hint</div>${esc(gen.hints(params)[fc.hintsShown-1])}</div>`;
    }
  }
  html += '</div>';
  return html;
}

function renderVideo(d){
  return `
  <div class="level-label">Level 2 — Watch One Short Video</div>
  <div class="video-card">
    <div class="vc-icon">🎬</div>
    <div class="vc-label">${esc(d.video.label)}</div>
    <div class="vc-note">Opens a search so you can pick the clearest video for this topic.</div>
    <a class="primary-btn" href="${d.video.url}" target="_blank" rel="noopener">Watch the video</a><br>
    ${videoWatched ? `<button class="primary-btn" id="toPractice" style="margin-top:14px;">Continue to Practice →</button>` : `<button class="secondary-btn" id="markWatched">I watched it</button>`}
  </div>`;
}

function renderMathQuiz(d, label, isBoss){
  const total = quiz.list.length;
  if(quiz.idx >= total) return '<div style="text-align:center;color:#a8a6ae;">Loading…</div>';
  const q = quiz.list[quiz.idx];
  let html = `<div class="level-label">${isBoss ? 'Level 4' : 'Level 3'} — ${esc(label)}</div>`;

  if(isBoss){
    const need = bossThreshold(d);
    const pct = Math.round((quiz.idx/total)*100);
    html += `<div class="boss-meter-wrap"><div class="boss-meter-label"><span>Question ${quiz.idx+1} of ${total}</span><span>Need ${need} correct to win</span></div><div class="boss-meter"><div class="boss-meter-fill" style="width:${pct}%;"></div></div></div>`;
  } else {
    html += `<div class="quiz-progress">Question ${quiz.idx+1} of ${total}</div>`;
  }

  html += `<div class="quiz-q">${esc(q.q)}</div><div class="quiz-choices">`;
  q.choices.forEach((c,i)=>{
    let cls = 'choice-btn';
    if(quiz.showResult){ if(i===q.correct) cls += ' correct'; else if(i===quiz.selected) cls += ' wrong'; }
    html += `<button class="${cls}" data-mchoice="${i}" ${quiz.showResult?'disabled':''}>${esc(c)}</button>`;
  });
  html += '</div>';

  if(quiz.showResult){
    const wasRight = quiz.selected === q.correct;
    html += `<div class="feedback ${wasRight?'ok':'bad'}">${wasRight ? '✅ Correct!' : '❌ Not quite — correct answer is highlighted.'}</div>`;
    html += `<button class="primary-btn" id="mNextQ">${quiz.idx+1 >= total ? (isBoss ? 'Finish Battle' : 'Continue') : 'Next Question →'}</button>`;
  }
  return html;
}

function renderMathSummary(d){
  const need = bossThreshold(d);
  if(lastBossPassed){
    const isFinal = d.day === DAYS.length;
    return `
    <div class="summary-wrap">
      <div class="summary-icon">${isFinal ? '🏆' : '⚡'}</div>
      <div class="summary-title">${isFinal ? 'Academy Complete!' : 'Day Complete!'}</div>
      <div class="summary-sub">You scored ${quiz.correct}/${quiz.list.length} on the boss battle (needed ${need}).</div>
      <div class="xp-pill">+${lastXpGain} XP earned</div>
      ${d.specialBadge ? `<div style="margin-bottom:18px;font-size:14px;">${d.specialBadge.icon} Badge unlocked: <b>${esc(d.specialBadge.name)}</b></div>` : ''}
      ${isFinal ? `<div style="font-size:13.5px;color:var(--ink-dim);margin-bottom:18px;">He's ready for 7th grade multiplication, division, fractions, decimals, negatives, and one-step algebra!</div>` : ''}
      <br><button class="primary-btn" id="toDashboard">Back to the Path</button>
    </div>`;
  } else {
    return `
    <div class="summary-wrap">
      <div class="summary-icon">🌀</div>
      <div class="summary-title">So Close!</div>
      <div class="fail-note">Scored ${quiz.correct}/${quiz.list.length} — needed ${need} to pass. No XP lost, just run it back.</div>
      <button class="primary-btn" id="retryBoss">Retry Boss Battle</button><br><br>
      <button class="secondary-btn" id="toDashboard">Back to the Path</button>
    </div>`;
  }
}

/* ---------------- READING: DASHBOARD ---------------- */
function renderReadingDashboard(){
  let html = `<div class="hub-card" id="openHub"><div class="hub-icon">📚</div><div><div class="hub-t">Book Reference Hub</div><div class="hub-s">Summary · Characters · Glossary · Themes · Fun Facts · Quote</div></div></div>`;
  html += '<div class="path">';
  READING_DAYS.forEach(rd=>{
    const done = !!progress.readingCompletedDays[rd.day];
    const locked = rd.day > progress.readingUnlockedDay;
    const current = rd.day === progress.readingUnlockedDay && !done;
    let cls = 'node';
    if(locked) cls += ' locked'; else if(done) cls += ' done'; else if(current) cls += ' current';
    html += `<div class="${cls}" data-rday="${rd.day}">
      <div class="num">${done ? '✓' : rd.day}</div>
      <div class="info"><div class="nt">${esc(rd.title)}</div><div class="ns">${esc(rd.pages)}</div></div>
      ${rd.specialBadge ? `<div class="badge-icon">${rd.specialBadge.icon}</div>` : ''}
      ${locked ? '<div class="lock-icon">🔒</div>' : ''}
    </div>`;
  });
  html += '</div>';
  html += `<div class="reset-row"><button class="reset-btn" id="resetBtn">Reset all progress</button></div>`;
  return html;
}

function renderReadingHub(){
  let html = `<button class="back-btn" id="backBtn">← Back to reading path</button>`;
  html += `<div class="ref-section"><h3>Book Overview</h3><p>${esc(BOOK_REF.summary)}</p></div>`;
  html += `<div class="ref-section"><h3>Who's Who</h3>`;
  BOOK_REF.characters.forEach(c=>{ html += `<div class="char-row"><div class="cname">${esc(c.name)}</div><div class="cdesc">${esc(c.desc)}</div></div>`; });
  html += `</div>`;
  html += `<div class="ref-section"><h3>Must-Know Glossary</h3>`;
  BOOK_REF.glossary.forEach(g=>{ html += `<div class="glossary-item"><b>${esc(g.term)}</b> — ${esc(g.def)}</div>`; });
  html += `</div>`;
  html += `<div class="ref-section"><h3>Meanings & Themes</h3>`;
  BOOK_REF.themes.forEach(t=>{ html += `<p><b>${esc(t.title)}:</b> ${esc(t.desc)}</p>`; });
  html += `</div>`;
  html += `<div class="ref-section"><h3>Fun Facts</h3>`;
  BOOK_REF.funFacts.forEach(f=>{ html += `<div class="fact-item">${esc(f)}</div>`; });
  html += `</div>`;
  html += `<div class="quote-box"><div class="qq">"${esc(BOOK_REF.quote.text)}"</div><div class="qa">${esc(BOOK_REF.quote.note)}</div></div>`;
  return html;
}

/* ---------------- READING: DAY SCREEN ---------------- */
function renderReadingDayScreen(){
  const rd = READING_DAYS[view.day-1];
  let html = `<button class="back-btn" id="backBtn">← Back to reading path</button>`;
  html += `<div class="day-header"><div class="day-title">Day ${rd.day}: ${esc(rd.title)}</div><div class="day-sub">${esc(rd.pages)}</div></div>`;

  if(view.sub !== 'summary'){
    const stages = ['recap','quiz','challenge'];
    const curIdx = stages.indexOf(view.sub);
    html += '<div class="levels-row">';
    stages.forEach((s,i)=>{
      let pc = 'level-pip';
      if(i < curIdx) pc += ' pastdone'; else if(i===curIdx) pc += ' active';
      html += `<div class="${pc}"></div>`;
    });
    html += '</div>';
  }

  if(view.sub==='recap') html += renderReadingRecap(rd);
  else if(view.sub==='quiz') html += renderReadingQuiz(rd);
  else if(view.sub==='challenge') html += renderReadingChallenge(rd);
  else if(view.sub==='summary') html += renderReadingSummary(rd);

  return html;
}

function renderReadingRecap(rd){
  return `
  <div class="level-label">What Happens in This Chunk</div>
  <div class="recap-card">${esc(rd.recap)}</div>
  <div class="vocab-card"><div class="v-term">📌 ${esc(rd.vocabTerm)}</div><div class="v-def">${esc(rd.vocabDef)}</div></div>
  <button class="primary-btn" id="toReadingQuiz">Continue to Quick Check →</button>`;
}

function renderReadingQuiz(rd){
  const total = rquiz.list.length;
  if(rquiz.idx >= total) return '<div style="text-align:center;color:#a8a6ae;">Loading…</div>';
  const q = rquiz.list[rquiz.idx];
  let html = `<div class="level-label">Quick Comprehension Check</div><div class="quiz-progress">Question ${rquiz.idx+1} of ${total}</div>`;
  html += `<div class="quiz-q">${esc(q.q)}</div><div class="quiz-choices">`;
  q.choices.forEach((c,i)=>{
    let cls = 'choice-btn';
    if(rquiz.showResult){ if(i===q.correct) cls += ' correct'; else if(i===rquiz.selected) cls += ' wrong'; }
    html += `<button class="${cls}" data-rchoice="${i}" ${rquiz.showResult?'disabled':''}>${esc(c)}</button>`;
  });
  html += '</div>';
  if(rquiz.showResult){
    const wasRight = rquiz.selected === q.correct;
    html += `<div class="feedback ${wasRight?'ok':'bad'}">${wasRight ? '✅ Correct! +10 XP' : '❌ Not quite — correct answer is highlighted.'}</div>`;
    html += `<button class="primary-btn" id="rNextQ">${rquiz.idx+1 >= total ? 'Continue →' : 'Next Question →'}</button>`;
  }
  return html;
}

function renderReadingChallenge(rd){
  return `
  <div class="level-label">Discussion / Creative Challenge</div>
  <div class="challenge-card"><div class="ch-tag">Talk it out or write it down</div>${esc(rd.challenge)}</div>
  <button class="primary-btn" id="doneChallenge">Mark Challenge Complete →</button>`;
}

function renderReadingSummary(rd){
  const isFinal = rd.day === READING_DAYS.length;
  return `
  <div class="summary-wrap">
    <div class="summary-icon">${isFinal ? '🏆' : '📖'}</div>
    <div class="summary-title">${isFinal ? 'Book Complete!' : 'Day Complete!'}</div>
    <div class="summary-sub">Scored ${rquiz.correct}/${rquiz.list.length} on the comprehension check.</div>
    <div class="xp-pill">+${lastXpGain} XP earned</div>
    ${rd.specialBadge ? `<div style="margin-bottom:18px;font-size:14px;">${rd.specialBadge.icon} Badge unlocked: <b>${esc(rd.specialBadge.name)}</b></div>` : ''}
    ${isFinal ? `<div style="font-size:13.5px;color:var(--ink-dim);margin-bottom:18px;">He's finished Aru Shah and the End of Time — and understands the story, characters, and themes!</div>` : ''}
    <br><button class="primary-btn" id="toDashboard">Back to the Reading Path</button>
  </div>`;
}

/* ============================================================
   EVENTS
   ============================================================ */
function bindEvents(){
  const tabMath = document.getElementById('tabMath'); if(tabMath) tabMath.onclick = ()=>switchMode('math');
  const tabReading = document.getElementById('tabReading'); if(tabReading) tabReading.onclick = ()=>switchMode('reading');

  const backBtn = document.getElementById('backBtn'); if(backBtn) backBtn.onclick = goDashboard;
  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.onclick = ()=>{ if(confirm('Reset all XP, badges, and unlocked days? This cannot be undone.')) resetProgress(); };

  document.querySelectorAll('.node[data-mday]').forEach(el=>{ el.onclick = ()=> openMathDay(parseInt(el.dataset.mday,10)); });
  document.querySelectorAll('.node[data-rday]').forEach(el=>{ el.onclick = ()=> openReadingDay(parseInt(el.dataset.rday,10)); });
  const openHub = document.getElementById('openHub'); if(openHub) openHub.onclick = openReadingHub;

  /* Flashcards */
  const fcInput = document.getElementById('fcInput');
  const fcSubmitBtn = document.getElementById('fcSubmitBtn');
  if(fcSubmitBtn) fcSubmitBtn.onclick = ()=>{ const v = fcInput ? fcInput.value : ''; fcSubmit(v); };
  if(fcInput){ fcInput.focus(); fcInput.onkeydown = (e)=>{ if(e.key==='Enter') fcSubmit(fcInput.value); }; }

  const fcVerifyInput = document.getElementById('fcVerifyInput');
  const fcVerifySubmit = document.getElementById('fcVerifySubmit');
  if(fcVerifySubmit) fcVerifySubmit.onclick = ()=>{ const v = fcVerifyInput ? fcVerifyInput.value : ''; fcSubmit(v); };
  if(fcVerifyInput){ fcVerifyInput.focus(); fcVerifyInput.onkeydown = (e)=>{ if(e.key==='Enter') fcSubmit(fcVerifyInput.value); }; }

  const fcSkipBtn = document.getElementById('fcSkipBtn'); if(fcSkipBtn) fcSkipBtn.onclick = fcSkip;
  const fcContinueAfterVerify = document.getElementById('fcContinueAfterVerify'); if(fcContinueAfterVerify) fcContinueAfterVerify.onclick = fcAdvance;

  /* Video */
  const markWatched = document.getElementById('markWatched'); if(markWatched) markWatched.onclick = markVideoWatched;
  const toPractice = document.getElementById('toPractice'); if(toPractice) toPractice.onclick = ()=>goMathSub('practice');

  /* Math quiz */
  document.querySelectorAll('.choice-btn[data-mchoice]').forEach(el=>{ el.onclick = ()=> selectAnswer(parseInt(el.dataset.mchoice,10)); });
  const mNextQ = document.getElementById('mNextQ'); if(mNextQ) mNextQ.onclick = nextQuestion;
  const toDashboardMath = document.getElementById('toDashboard'); if(toDashboardMath) toDashboardMath.onclick = goDashboard;
  const retry = document.getElementById('retryBoss'); if(retry) retry.onclick = retryBoss;

  /* Reading */
  const toReadingQuiz = document.getElementById('toReadingQuiz'); if(toReadingQuiz) toReadingQuiz.onclick = ()=>goReadingSub('quiz');
  document.querySelectorAll('.choice-btn[data-rchoice]').forEach(el=>{ el.onclick = ()=> rSelectAnswer(parseInt(el.dataset.rchoice,10)); });
  const rNextQ = document.getElementById('rNextQ'); if(rNextQ) rNextQ.onclick = rNextQuestion;
  const doneChallenge = document.getElementById('doneChallenge'); if(doneChallenge) doneChallenge.onclick = markChallengeDone;
}

loadProgress();
})();
</script>
